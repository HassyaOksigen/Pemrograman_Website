<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Tandoor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box wide">
            <header>
                <h1 class="brand-title">Daftar</h1>
                <p>Bergabung dengan Tandoor</p>
            </header>
            
            <form>
                <div class="row">
                    <div class="input-group">
                        <label>Nama Depan *</label>
                        <input type="text" placeholder="Nama" required>
                    </div>
                    <div class="input-group">
                        <label>Nama Belakang *</label>
                        <input type="text" placeholder="Nama" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email *</label>
                    <input type="email" placeholder="Masukkan email Anda" required>
                </div>

                <div class="input-group">
                    <label>No. Telepon *</label>
                    <input type="tel" placeholder="Masukkan nomor telepon" required>
                </div>

                <div class="input-group">
                    <label>Katasandi *</label>
                    <input type="password" placeholder="Buat kata sandi" required>
                    <small>Minimal 8 karakter</small>
                </div>

                <div class="input-group">
                    <label>Konfirmasi Kata Sandi *</label>
                    <input type="password" placeholder="Masukkan kata sandi" required>
                </div>

                <button type="submit" class="btn-primary">Daftar</button>
            </form>

            <div class="divider"><span>atau</span></div>

            <p class="footer-text">Sudah punya akun? <a href="index.html">Masuk</a></p>
        </div>
    </div>
</body>
</html>
