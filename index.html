<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Tandoor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <header>
                <h1 class="brand-title">Masuk</h1>
                <p>Selamat datang kembali di Tandoor</p>
            </header>
            
            <form>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Masukkan email Anda" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Masukkan kata sandi" required>
                </div>

                <div class="auth-options">
                    <label><input type="checkbox"> Ingat saya</label>
                    <a href="#" class="forgot-link">Lupa kata sandi?</a>
                </div>

                <button type="submit" class="btn-primary">Masuk</button>
            </form>

            <div class="divider"><span>atau</span></div>

            <p class="footer-text">Belum punya akun? <a href="daftar.html">Daftar</a></p>
        </div>
    </div>
</body>
</html>
